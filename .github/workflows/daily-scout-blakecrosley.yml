name: "📚 Daily Scout — Blake Crosley"

# 매일 22:30 KST (13:30 UTC) — Blake Crosley 블로그 스캔 → MDX 엔트리 자동 생성 → PR
on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scout Blake Crosley
        id: scout
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: node scripts/scout-blakecrosley.mjs

      - name: Validate + auto-fix Mermaid
        if: steps.scout.outputs.match_count > 0
        run: |
          echo "🔍 생성된 MDX 검증 + Mermaid 자동 수정..."
          node scripts/validate-content.mjs
          echo "✅ MDX 검증 통과"

      - name: Create PR
        if: steps.scout.outputs.match_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLES: ${{ steps.scout.outputs.created_titles }}
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          BRANCH="blake-crosley/${DATE}"

          git config user.name "Mino777"
          git config user.email "jomino7777@gmail.com"

          git checkout -b "$BRANCH"
          git add content/ data/
          git diff --staged --quiet && echo "변경 없음 — 스킵" && exit 0

          git commit -m "📚 Blake Crosley 스카우트: ${TITLES:-새 엔트리}

          Generated by scout-blakecrosley.mjs
          Source: blakecrosley.com"

          git push origin "$BRANCH"

          gh pr create \
            --title "📚 Blake Crosley 스카우트: ${TITLES:-새 엔트리}" \
            --body "## 📚 Blake Crosley 블로그 자동 큐레이션

          **날짜:** ${DATE}
          **생성된 엔트리:** ${TITLES:-확인 필요}

          ### 학습 방법
          1. PR의 MDX 파일을 읽고 검토하세요
          2. 틀린 부분이나 보충할 내용을 직접 수정하세요
          3. 수정 완료 후 머지 → 위키 자동 반영

          > 🤖 자동 생성 by scout-blakecrosley.mjs" \
            --base main \
            --head "$BRANCH"

      - name: Commit seen state (no PR case)
        if: steps.scout.outputs.match_count == 0 || steps.scout.outputs.match_count == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/scout-blakecrosley-seen.json ]; then
            git add data/scout-blakecrosley-seen.json
            git diff --staged --quiet || git commit -m "chore: update blake-crosley seen state"
            git push || true
          fi

      - name: Summary
        if: always()
        run: |
          echo "### 📚 Blake Crosley Scout Results" >> $GITHUB_STEP_SUMMARY
          echo "- Matches: ${{ steps.scout.outputs.match_count || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Created: ${{ steps.scout.outputs.created_titles || 'none' }}" >> $GITHUB_STEP_SUMMARY
