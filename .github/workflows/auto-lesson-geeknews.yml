name: "📰 Auto Lesson from GeekNews"

# 매일 08:50 KST (23:50 UTC) — daily-lesson(09:00 KST) 10분 전 실행
# 24h 지난 미응답 이슈가 있으면 긱뉴스 큐레이션 → 자동 엔트리 생성
on:
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch: # 수동 실행

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-curate:
    runs-on: ubuntu-latest
    steps:
      - name: Check for stale daily lesson issues
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 24h 이상 된 미응답 "오늘의 학습" 이슈 찾기
          STALE_ISSUES=$(gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --search "오늘의 학습 주제를 골라주세요 in:title" \
            --json number,title,createdAt \
            --jq '[.[] | select(
              (now - (.createdAt | fromdateiso8601)) > 72000
            )]')

          COUNT=$(echo "$STALE_ISSUES" | jq 'length')
          echo "stale_count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" -gt 0 ]; then
            # 가장 오래된 이슈 번호
            ISSUE_NUM=$(echo "$STALE_ISSUES" | jq -r '.[0].number')
            echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
            echo "has_stale=true" >> $GITHUB_OUTPUT
            echo "📋 스테일 이슈 발견: #$ISSUE_NUM ($COUNT건)"
          else
            echo "has_stale=false" >> $GITHUB_OUTPUT
            echo "✅ 스테일 이슈 없음 — 스킵"
          fi

      - name: Checkout
        if: steps.check.outputs.has_stale == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check.outputs.has_stale == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.check.outputs.has_stale == 'true'
        run: npm ci

      - name: Build manifest
        if: steps.check.outputs.has_stale == 'true'
        run: node scripts/generate-content-manifest.mjs

      - name: Curate from GeekNews + Generate entry
        if: steps.check.outputs.has_stale == 'true'
        id: curate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/curate-geeknews.mjs

      - name: Create PR
        if: steps.check.outputs.has_stale == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: ${{ steps.curate.outputs.selected_topic }}
          SOURCE_TITLE: ${{ steps.curate.outputs.selected_title }}
          SOURCE_LINK: ${{ steps.curate.outputs.selected_link }}
          ISSUE_NUM: ${{ steps.check.outputs.issue_number }}
        run: |
          SAFE_TOPIC=$(echo "$TOPIC" | tr '`' "'")
          DATE=$(date +%Y-%m-%d)
          BRANCH="auto-lesson/${DATE}-geeknews"

          git config user.name "Mino777"
          git config user.email "jomino7777@gmail.com"

          git checkout -b "$BRANCH"
          git add content/
          git commit -m "📰 긱뉴스 자동 큐레이션: ${SAFE_TOPIC}

          Source: ${SOURCE_TITLE}
          Link: ${SOURCE_LINK}
          Generated by AI 과외 선생님 (GeekNews auto-curation)
          Stale issue: #${ISSUE_NUM}"

          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "📰 긱뉴스 자동 학습: ${SAFE_TOPIC}" \
            --body "## 📰 긱뉴스 자동 큐레이션

          **주제:** ${SAFE_TOPIC}
          **원본:** [${SOURCE_TITLE}](${SOURCE_LINK})
          **날짜:** ${DATE}
          **트리거:** Issue #${ISSUE_NUM} 24시간 미응답

          ### 왜 이 글?
          Gemini가 긱뉴스 최신 글 중 위키 방향성(AI 엔지니어링)에
          가장 부합하는 글을 자동 선정했습니다.

          ### 학습 방법
          1. PR의 파일을 읽고 학습하세요
          2. 틀린 부분이나 보충할 내용을 직접 수정하세요
          3. 수정 완료 후 머지 → 위키 자동 반영

          > 이 PR은 자동 머지됩니다. 수정이 필요하면 머지 전에 커밋하세요." \
            --base main \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Auto-merge PR
        if: steps.check.outputs.has_stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(echo "${{ steps.pr.outputs.pr_url }}" | grep -oE '[0-9]+$')
          # CI 통과 대기 후 머지 (최대 5분)
          for i in $(seq 1 10); do
            sleep 30
            STATUS=$(gh pr checks "$PR_NUM" --repo ${{ github.repository }} 2>&1 || true)
            if echo "$STATUS" | grep -q "pass\|All checks were successful"; then
              gh pr merge "$PR_NUM" --repo ${{ github.repository }} --squash --auto
              echo "✅ PR #$PR_NUM 자동 머지 예약"
              break
            fi
            echo "⏳ CI 대기 중... ($i/10)"
          done

      - name: Close stale issue
        if: steps.check.outputs.has_stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.check.outputs.issue_number }} \
            --repo ${{ github.repository }} \
            --body "⏰ 24시간 동안 응답이 없어 **긱뉴스 자동 큐레이션**으로 대체되었습니다.

          📰 **선정된 글:** ${{ steps.curate.outputs.selected_title }}
          📝 **생성된 PR:** ${{ steps.pr.outputs.pr_url }}

          > 다음엔 이슈에 번호(1/2/3)를 댓글로 남겨주세요!"

          gh issue close ${{ steps.check.outputs.issue_number }} \
            --repo ${{ github.repository }} \
            --reason "not planned"

      - name: Close remaining stale issues
        if: steps.check.outputs.has_stale == 'true' && steps.check.outputs.stale_count > 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 나머지 스테일 이슈도 정리
          gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --search "오늘의 학습 주제를 골라주세요 in:title" \
            --json number \
            --jq '.[].number' | while read NUM; do
            if [ "$NUM" != "${{ steps.check.outputs.issue_number }}" ]; then
              gh issue close "$NUM" --repo ${{ github.repository }} --reason "not planned" \
                --comment "⏰ 기한 초과 — 자동 정리됨"
            fi
          done
