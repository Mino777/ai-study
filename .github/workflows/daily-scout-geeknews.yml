name: "🔭 Daily Scout — GeekNews"

# 매일 22:00 KST (13:00 UTC) — 긱뉴스 전체 스캔 → 프로젝트별 이식 계획
# 다른 레포에 Issue 생성하려면 GH_PAT secret 필요 (repo scope)
# GH_PAT 미설정 시 GITHUB_TOKEN으로 폴백 (현재 레포만 가능)
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: # 수동 트리거 지원

permissions:
  contents: read
  issues: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scout GeekNews
        id: scout
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: node scripts/scout-geeknews.mjs

      - name: Summary
        if: always()
        run: |
          echo "### 🔭 Scout Results" >> $GITHUB_STEP_SUMMARY
          echo "- Matches: ${{ steps.scout.outputs.match_count || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Projects: ${{ steps.scout.outputs.matched_projects || 'none' }}" >> $GITHUB_STEP_SUMMARY
