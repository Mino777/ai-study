name: "📝 Generate Lesson on Pick"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate:
    # 오늘의 학습 이슈에 대한 사람 댓글만 처리 (bot 댓글 무시 — auto-lesson 클로즈 댓글 오트리거 방지)
    if: >-
      contains(github.event.issue.title, '오늘의 학습 주제를 골라주세요')
      && !github.event.issue.pull_request
      && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Parse choice
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          TRIMMED=$(echo "$COMMENT" | xargs)

          # Case 1: 번호 선택 (1, 2, 3)
          CHOICE=$(echo "$TRIMMED" | grep -oE '^[1-3]$' | head -1)
          if [ -n "$CHOICE" ]; then
            SLUG=$(echo "$ISSUE_BODY" | grep -oP "(?<=\`)[a-z-]+/[a-z-]+(?=\`)" | sed -n "${CHOICE}p")
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "custom_topic=" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "번호 선택: $CHOICE → $SLUG"
            exit 0
          fi

          # Case 2: 자유 텍스트 → 커스텀 주제
          if [ ${#TRIMMED} -ge 2 ]; then
            CUSTOM_SLUG=$(echo "$TRIMMED" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9가-힣 -]//g' | sed 's/ /-/g' | sed 's/--*/-/g')
            echo "slug=" >> $GITHUB_OUTPUT
            echo "custom_topic=$TRIMMED" >> $GITHUB_OUTPUT
            echo "custom_slug=$CUSTOM_SLUG" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "커스텀 주제: $TRIMMED"
            exit 0
          fi

          echo "valid=false" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.parse.outputs.valid == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.parse.outputs.valid == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.parse.outputs.valid == 'true'
        run: npm ci

      - name: Generate lesson
        if: steps.parse.outputs.valid == 'true'
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ steps.parse.outputs.slug }}" ]; then
            node scripts/generate-lesson.mjs generate "${{ steps.parse.outputs.slug }}"
          else
            node scripts/generate-lesson.mjs generate-custom "${{ steps.parse.outputs.custom_topic }}"
          fi

      - name: Create PR
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: ${{ steps.generate.outputs.topic_title }}
          CATEGORY: ${{ steps.generate.outputs.category }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # 백틱/특수문자 안전: env로 주입하여 shell 해석 방지
          SAFE_TOPIC=$(echo "$TOPIC" | tr '`' "'")
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          SHORT_ID=$(date +%H%M%S)
          BRANCH="lesson/${DATE}-${SHORT_ID}"

          git config user.name "Mino777"
          git config user.email "jomino7777@gmail.com"

          git checkout -b "$BRANCH"
          git add content/
          git commit -m "📚 오늘의 학습: ${SAFE_TOPIC}

          Category: ${CATEGORY}
          Generated by AI 과외 선생님 (Gemini 2.5 Pro)
          Chosen from daily suggestions issue #${ISSUE_NUM}"

          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "📚 오늘의 학습: ${SAFE_TOPIC}" \
            --body "## 🎓 AI 과외 선생님이 준비한 오늘의 학습

          **주제:** ${SAFE_TOPIC}
          **카테고리:** ${CATEGORY}
          **날짜:** ${DATE}
          **선택:** Issue #${ISSUE_NUM}에서 선택됨

          ### 학습 방법
          1. 이 PR의 파일을 읽고 학습하세요
          2. 틀린 부분이나 보충할 내용을 직접 수정하세요
          3. 수정이 완료되면 머지하세요
          4. 머지하면 위키에 자동 반영됩니다

          > 수정한 부분 = 당신의 학습 기록 (git diff로 추적됩니다)" \
            --base main \
            --head "$BRANCH")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Comment on issue with PR link
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "✅ **${{ steps.generate.outputs.topic_title }}** 학습 콘텐츠가 생성되었습니다!

          👉 PR: ${{ steps.generate.outputs.pr_url || '생성된 PR을 확인하세요' }}

          PR을 읽고, 수정하고, 머지하세요."

      - name: Close issue
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --reason completed
