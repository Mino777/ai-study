name: "🧹 Validate & Prune Scout Issues"

# 수동 트리거 전용 — 기존 Scout 이슈 일괄 검증 후 7점 미만 close
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (close 없이 검증만)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate existing Scout issues
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/validate-existing-scout-issues.mjs --dry-run
          else
            node scripts/validate-existing-scout-issues.mjs
          fi
