name: "🎓 Daily Topic Suggestions"

on:
  schedule:
    # ���일 오전 9시 KST (UTC 0시) — 5분 오프셋으로 GitHub 스케줄러 재등록 유도
    - cron: "5 0 * * *"
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: read
  issues: write

jobs:
  suggest-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Suggest 3 topics
        id: suggest
        run: node scripts/generate-lesson.mjs suggest

      - name: Create issue with topic choices
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          TOPIC1="${{ steps.suggest.outputs.topic_1_title }}"
          TOPIC2="${{ steps.suggest.outputs.topic_2_title }}"
          TOPIC3="${{ steps.suggest.outputs.topic_3_title }}"
          CAT1="${{ steps.suggest.outputs.topic_1_category }}"
          CAT2="${{ steps.suggest.outputs.topic_2_category }}"
          CAT3="${{ steps.suggest.outputs.topic_3_category }}"
          SLUG1="${{ steps.suggest.outputs.topic_1_slug }}"
          SLUG2="${{ steps.suggest.outputs.topic_2_slug }}"
          SLUG3="${{ steps.suggest.outputs.topic_3_slug }}"

          gh issue create \
            --title "📚 ${DATE} 오늘의 학습 주제를 골라주세요" \
            --body "## 🎓 AI 과외 선생님이 추천하는 오늘의 주제

          아래 3개 중 하나를 골라주세요. **번호만 댓글로 남기면** 해당 주제로 학습 콘텐츠가 자동 생성됩니다.

          ---

          **1️⃣ [${CAT1}] ${TOPIC1}**
          \`${SLUG1}\`

          **2️⃣ [${CAT2}] ${TOPIC2}**
          \`${SLUG2}\`

          **3️⃣ [${CAT3}] ${TOPIC3}**
          \`${SLUG3}\`

          ---

          > 댓글에 \`1\`, \`2\`, 또는 \`3\`을 입력하세요."
