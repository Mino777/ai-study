name: "🎓 Daily AI Lesson"

on:
  schedule:
    # 매일 오전 9시 KST (UTC 0시)
    - cron: "0 0 * * *"
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-lesson:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate today's lesson
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-lesson.mjs

      - name: Regenerate manifest
        run: node scripts/generate-content-manifest.mjs

      - name: Check for changes
        id: changes
        run: |
          git add content/ src/generated/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git reset HEAD
          fi

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOPIC="${{ steps.generate.outputs.topic_title }}"
          CATEGORY="${{ steps.generate.outputs.category }}"
          DATE=$(date +%Y-%m-%d)
          BRANCH="lesson/${DATE}"

          git config user.name "AI Tutor Bot"
          git config user.email "ai-tutor@ai-study.dev"

          git checkout -b "$BRANCH"
          git add content/ src/generated/
          git commit -m "📚 오늘의 학습: ${TOPIC}

          Category: ${CATEGORY}
          Generated by AI 과외 선생님 (Gemini 2.5 Flash)

          이 PR을 읽고 학습한 후, 수정하고 머지하세요.
          수정한 부분이 당신의 학습 기록이 됩니다."

          git push origin "$BRANCH"

          gh pr create \
            --title "📚 오늘의 학습: ${TOPIC}" \
            --body "## 🎓 AI 과외 선생님이 준비한 오늘의 학습

          **주제:** ${TOPIC}
          **카테고리:** ${CATEGORY}
          **날짜:** ${DATE}

          ### 학습 방법
          1. 아래 파일을 읽고 학습하세요
          2. 틀린 부분이나 보충할 내용을 직접 수정하세요
          3. 수정이 완료되면 머지하세요
          4. 머지하면 위키에 자동 반영됩니다

          > 수정한 부분 = 당신의 학습 기록 (git diff로 추적됩니다)" \
            --base main \
            --head "$BRANCH" \
            --label "ai-lesson"
